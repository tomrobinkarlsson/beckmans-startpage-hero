<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beckmans — Triptych Hero</title>
  <link rel="stylesheet" href="./triptych-hero.css" />
</head>
<body>
  <section class="hero" id="hero" aria-label="Beckmans programs hero">
    <nav class="top-nav" aria-label="Main navigation">
      <span class="brand nav-fixed">beckmans designhögskola</span>
      <span class="nav-link nav-fixed nav-form">form</span>
      <span class="nav-link nav-fixed nav-mode">mode</span>
      <span class="nav-link nav-fixed nav-vk">visuell kommunikation</span>
      <span class="nav-link nav-fixed nav-evening">kvällskolan</span>
      <span class="nav-link nav-fixed nav-apply">ansök</span>
    </nav>

    <div class="hero-grid" id="heroGrid">
      <article class="hero-column" data-program-index="0" data-program="form">
        <canvas class="hero-canvas" aria-hidden="true"></canvas>
        <div class="fallback-media" aria-hidden="true">
          <img class="fallback-current" alt="" />
          <img class="fallback-next" alt="" />
        </div>
        <div class="column-overlay" aria-hidden="true"></div>
        <div class="slide-label label-bottom-left column-meta" aria-live="polite">
          <div class="label-row">
            <div class="label-pad"></div>
            <div class="label-content">
              <span class="label-text" data-meta-student></span>
            </div>
            <div class="label-cap"><img src="./assets/vectors/ellipse-4.svg" alt="" /></div>
          </div>
          <div class="label-sep"></div>
          <div class="label-row">
            <div class="label-pad"></div>
            <div class="label-content">
              <span class="label-text label-project" data-meta-title></span>
            </div>
            <div class="label-cap"><img src="./assets/vectors/ellipse-4.svg" alt="" /></div>
          </div>
          <div class="label-sep"></div>
          <div class="label-row">
            <div class="label-pad"></div>
            <div class="label-content">
              <div class="label-dots" data-progress-markers></div>
            </div>
            <div class="label-cap"><img src="./assets/vectors/ellipse-4.svg" alt="" /></div>
          </div>
        </div>
      </article>

      <article class="hero-column" data-program-index="1" data-program="mode">
        <canvas class="hero-canvas" aria-hidden="true"></canvas>
        <div class="fallback-media" aria-hidden="true">
          <img class="fallback-current" alt="" />
          <img class="fallback-next" alt="" />
        </div>
        <div class="column-overlay" aria-hidden="true"></div>
        <div class="slide-label label-bottom-left column-meta" aria-live="polite">
          <div class="label-row">
            <div class="label-pad"></div>
            <div class="label-content">
              <span class="label-text" data-meta-student></span>
            </div>
            <div class="label-cap"><img src="./assets/vectors/ellipse-4.svg" alt="" /></div>
          </div>
          <div class="label-sep"></div>
          <div class="label-row">
            <div class="label-pad"></div>
            <div class="label-content">
              <span class="label-text label-project" data-meta-title></span>
            </div>
            <div class="label-cap"><img src="./assets/vectors/ellipse-4.svg" alt="" /></div>
          </div>
          <div class="label-sep"></div>
          <div class="label-row">
            <div class="label-pad"></div>
            <div class="label-content">
              <div class="label-dots" data-progress-markers></div>
            </div>
            <div class="label-cap"><img src="./assets/vectors/ellipse-4.svg" alt="" /></div>
          </div>
        </div>
      </article>

      <article class="hero-column" data-program-index="2" data-program="visuell kommunikation">
        <canvas class="hero-canvas" aria-hidden="true"></canvas>
        <div class="fallback-media" aria-hidden="true">
          <img class="fallback-current" alt="" />
          <img class="fallback-next" alt="" />
        </div>
        <div class="column-overlay" aria-hidden="true"></div>
        <div class="slide-label label-bottom-left column-meta" aria-live="polite">
          <div class="label-row">
            <div class="label-pad"></div>
            <div class="label-content">
              <span class="label-text" data-meta-student></span>
            </div>
            <div class="label-cap"><img src="./assets/vectors/ellipse-4.svg" alt="" /></div>
          </div>
          <div class="label-sep"></div>
          <div class="label-row">
            <div class="label-pad"></div>
            <div class="label-content">
              <span class="label-text label-project" data-meta-title></span>
            </div>
            <div class="label-cap"><img src="./assets/vectors/ellipse-4.svg" alt="" /></div>
          </div>
          <div class="label-sep"></div>
          <div class="label-row">
            <div class="label-pad"></div>
            <div class="label-content">
              <div class="label-dots" data-progress-markers></div>
            </div>
            <div class="label-cap"><img src="./assets/vectors/ellipse-4.svg" alt="" /></div>
          </div>
        </div>
      </article>
    </div>

    <div class="hero-cursor" id="heroCursor" aria-hidden="true">
      <img class="cursor-bracket-image cursor-bracket-left" src="./assets/vectors/bracket-right.svg" alt="" />
      <span class="cursor-label">
        <span class="cursor-program" id="cursorProgram">form</span>
        <span class="cursor-hp">180hp</span>
      </span>
      <img class="cursor-bracket-image cursor-bracket-right" src="./assets/vectors/bracket-right.svg" alt="" />
    </div>

    <noscript>
      <style>
        .fallback-media { display: block !important; }
      </style>
    </noscript>
  </section>

  <script type="module" src="./triptych-hero.js"></script>
</body>
</html>
