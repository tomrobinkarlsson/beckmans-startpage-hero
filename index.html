<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beckmans Hero States</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/gsap.min.js"></script>
</head>
<body>
  <section class="hero is-idle" aria-label="Beckmans hero states">
    <!-- Fallback layers (hidden when WebGL is available) -->
    <div class="bg-layer" id="bg-a"><img alt="" /></div>
    <div class="bg-layer" id="bg-b"><img alt="" /></div>
    <canvas class="webgl-canvas" id="webgl-canvas" aria-hidden="true"></canvas>
    <div class="image-dim" aria-hidden="true"></div>

    <nav class="top-nav">
      <span class="brand nav-fixed">beckmans designhögskola</span>
      <span class="nav-link nav-fixed nav-form">form</span>
      <span class="nav-link nav-fixed nav-mode">mode</span>
      <span class="nav-link nav-fixed nav-vk">visuell kommunikation</span>
      <span class="nav-link nav-fixed nav-evening">kvällskolan</span>
      <span class="nav-link nav-fixed nav-apply">ansök</span>
    </nav>

    <div class="headline">
      <button class="line" type="button" data-index="0" data-label="form">form</button>
      <button class="line" type="button" data-index="1" data-label="mode">mode</button>
      <button class="line line-vk" type="button" data-index="2" data-label="visuell kommunikation">visuell<br>kommunikation</button>
    </div>

    <div class="hp" id="hp" aria-hidden="true">
      <div class="hp-inner" id="hp-inner">
        <img class="hp-bracket left" src="./assets/vectors/bracket-left.svg" alt="" />
        <span class="hp-text">180hp</span>
        <img class="hp-bracket right" src="./assets/vectors/bracket-right.svg" alt="" />
      </div>
    </div>
  </section>

  <script type="module" src="main.js"></script>
</body>
</html>
