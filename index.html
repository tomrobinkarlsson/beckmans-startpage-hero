<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beckmans Hero States</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: #fff;
      color: #000;
      font-family: "FuturaEFOP-DemiBold", "Avenir Next", "Avenir", "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
    }

    .hero {
      width: 100vw;
      height: 100dvh;
      position: relative;
      overflow: hidden;
      background: #fff;
    }

    .bg-layer {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 620ms cubic-bezier(.2, .65, .2, 1);
      will-change: opacity;
    }

    .bg-layer.is-visible { opacity: 1; }

    .bg-layer img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .bg-layer::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      transition: background-color 280ms ease;
    }

    .top-nav {
      position: absolute;
      top: 22px;
      left: 23px;
      right: 23px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      z-index: 3;
    }

    .brand {
      font-size: 16px;
      line-height: 0.96;
      white-space: nowrap;
      text-transform: lowercase;
      transition: color 260ms ease;
    }

    .menu {
      display: inline-flex;
      align-items: center;
      gap: clamp(20px, 3vw, 46px);
    }

    .nav-link {
      color: inherit;
      font-size: 16px;
      letter-spacing: -0.02em;
      text-transform: lowercase;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: color 260ms ease;
      white-space: nowrap;
    }

    .headline {
      position: absolute;
      left: 16px;
      top: 160px;
      width: min(1118px, calc(100% - 260px));
      display: flex;
      flex-direction: column;
      gap: 40px;
      text-transform: lowercase;
      z-index: 2;
      user-select: none;
    }

    .line {
      margin: 0;
      font-size: clamp(66px, 12.7vw, 183px);
      line-height: 0.9;
      letter-spacing: -0.04em;
      color: #000;
      opacity: 1;
      width: fit-content;
      transition: opacity 320ms ease, color 280ms ease, transform 320ms ease;
    }

    .line[data-index] {
      cursor: pointer;
    }

    .line[data-index]:hover {
      transform: translateX(6px);
    }

    .line.is-active {
      opacity: 1;
      transform: translateX(8px);
    }

    .hp {
      position: absolute;
      left: 364px;
      top: 201px;
      margin: 0;
      font-size: clamp(28px, 3.35vw, 48px);
      line-height: 1;
      letter-spacing: -0.02em;
      color: #fff;
      z-index: 2;
      opacity: 0;
      will-change: top, left, opacity;
      transition: top 520ms cubic-bezier(.2, .65, .2, 1), left 520ms cubic-bezier(.2, .65, .2, 1), opacity 260ms ease;
    }

    .hero.is-idle .top-nav,
    .hero.is-idle .brand,
    .hero.is-idle .nav-link {
      color: #000;
    }

    .hero:not(.is-idle) .top-nav,
    .hero:not(.is-idle) .brand,
    .hero:not(.is-idle) .nav-link {
      color: #fff;
    }

    .hero:not(.is-idle) .line {
      color: #fff;
      opacity: 0.45;
    }

    .hero:not(.is-idle) .line.is-active {
      opacity: 1;
    }

    .hero:not(.is-idle) .hp {
      opacity: 1;
    }

    @media (max-width: 1050px) {
      .headline { width: calc(100% - 32px); top: 120px; gap: 20px; }
      .top-nav { flex-direction: column; align-items: flex-start; gap: 12px; }
      .menu { gap: 16px; flex-wrap: wrap; }
      .brand { font-size: 14px; }
      .nav-link { font-size: 14px; }
      .hp { left: auto; right: 24px; transition: top 520ms cubic-bezier(.2, .65, .2, 1), opacity 260ms ease; }
    }
  </style>
</head>
<body>
  <section class="hero is-idle" aria-label="Beckmans hero states">
    <div class="bg-layer" id="bg-a"><img alt="" /></div>
    <div class="bg-layer" id="bg-b"><img alt="" /></div>

    <nav class="top-nav">
      <span class="brand">beckmans designhögskola</span>
      <div class="menu" id="menu">
        <span class="nav-link">form</span>
        <span class="nav-link">mode</span>
        <span class="nav-link">visuell kommunikation</span>
        <span class="nav-link">kvällskolan</span>
        <span class="nav-link">ansök</span>
      </div>
    </nav>

    <div class="headline">
      <p class="line" data-line data-index="0" tabindex="0">form</p>
      <p class="line" data-line data-index="1" tabindex="0">mode</p>
      <p class="line" data-line data-index="2" tabindex="0">visuell kommunikation</p>
    </div>
    <p class="hp" id="hp">180hp</p>
  </section>

  <script>
    const states = [
      {
        image: "https://beckmans.se/wp-content/uploads/2025/02/hallway-bench-mikael-westman-01-1500x1000.jpg",
        hpXRatio: 0.2528,
        hpYRatio: 0.2513
      },
      {
        image: "https://beckmans.se/wp-content/uploads/2025/06/Erik-Marklund-Beckmans-Designhogskola-4-1500x1200.jpg",
        hpXRatio: 0.3097,
        hpYRatio: 0.4538
      },
      {
        image: "https://beckmans.se/wp-content/uploads/2025/12/491418745_18385417684138754_597021362675519425_n.jpeg",
        hpXRatio: 0.7896,
        hpYRatio: 0.8588
      }
    ];

    const hero = document.querySelector(".hero");
    const headline = document.querySelector(".headline");
    const bgA = document.getElementById("bg-a");
    const bgB = document.getElementById("bg-b");
    const hp = document.getElementById("hp");
    const lines = [...document.querySelectorAll("[data-line]")];
    const textLinks = [...document.querySelectorAll(".line[data-index]")];

    let current = -1;
    let showA = true;

    function paintText(index) {
      lines.forEach((line, i) => line.classList.toggle("is-active", i === index));
      const pxTop = Math.round(hero.clientHeight * states[index].hpYRatio);
      const pxLeft = Math.round(hero.clientWidth * states[index].hpXRatio);
      hp.style.top = `${pxTop}px`;
      if (window.innerWidth > 1050) {
        hp.style.left = `${pxLeft}px`;
      }
    }

    function paintBackground(index) {
      const nextLayer = showA ? bgB : bgA;
      const prevLayer = showA ? bgA : bgB;
      const img = nextLayer.querySelector("img");
      img.src = states[index].image;
      img.alt = `Beckmans ${textLinks[index].textContent.trim()}`;
      nextLayer.classList.add("is-visible");
      prevLayer.classList.remove("is-visible");
      showA = !showA;
    }

    function setState(index) {
      if (index === current) return;
      current = index;
      hero.classList.remove("is-idle");
      paintText(current);
      paintBackground(current);
    }

    function setIdle() {
      current = -1;
      hero.classList.add("is-idle");
      lines.forEach((line) => line.classList.remove("is-active"));
      bgA.classList.remove("is-visible");
      bgB.classList.remove("is-visible");
    }

    function init() {
      setIdle();
      textLinks.forEach((link, index) => {
        link.addEventListener("mouseenter", () => setState(index));
        link.addEventListener("focus", () => setState(index));
        link.addEventListener("click", () => setState(index));
        link.addEventListener("blur", () => {
          window.setTimeout(() => {
            if (!headline.contains(document.activeElement)) setIdle();
          }, 0);
        });
      });
      headline.addEventListener("mouseleave", setIdle);
      hero.addEventListener("mouseleave", setIdle);
      window.addEventListener("resize", () => {
        if (current >= 0) paintText(current);
      });
    }

    init();
  </script>
</body>
</html>
