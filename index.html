<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beckmans Hero States</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: "FuturaEFOP-DemiBold", "Avenir Next", "Avenir", "Helvetica Neue", Arial, sans-serif;
      display: grid;
      place-items: start center;
      padding: clamp(12px, 2.2vw, 28px);
    }

    .hero {
      width: min(1440px, 100%);
      height: min(800px, calc(100dvh - 24px));
      min-height: 520px;
      position: relative;
      overflow: hidden;
      background: #1a1a1a;
    }

    .bg-layer {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 820ms cubic-bezier(.2, .65, .2, 1);
      will-change: opacity;
    }

    .bg-layer.is-visible { opacity: 1; }

    .bg-layer img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .bg-layer::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
    }

    .top-nav {
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      height: 40px;
      display: grid;
      grid-template-columns: auto 1fr auto auto auto auto auto;
      align-items: center;
      gap: clamp(4px, 0.8vw, 14px);
      z-index: 3;
      padding: 0 6px;
    }

    .brand {
      color: #fff;
      font-size: 16px;
      line-height: 0.96;
      white-space: nowrap;
      text-transform: lowercase;
      margin-right: clamp(8px, 2vw, 22px);
    }

    .pill {
      appearance: none;
      border: 0;
      border-radius: 999px;
      background: #fff;
      color: #000;
      font: inherit;
      font-size: 16px;
      letter-spacing: -0.02em;
      text-transform: lowercase;
      line-height: 1;
      height: 40px;
      padding: 0 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: transform 220ms ease, background-color 220ms ease;
      white-space: nowrap;
    }

    .pill[data-state]::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -3px;
      width: 0;
      height: 2px;
      background: #ff5b57;
      transform: translateX(-50%);
      transition: width 250ms ease;
    }

    .pill.is-active[data-state]::after { width: 60%; }
    .pill:hover { transform: translateY(-1px); }

    .headline {
      position: absolute;
      left: 16px;
      top: 160px;
      width: min(1118px, calc(100% - 260px));
      display: flex;
      flex-direction: column;
      gap: 40px;
      text-transform: lowercase;
      z-index: 2;
      user-select: none;
    }

    .line {
      margin: 0;
      font-size: clamp(66px, 12.7vw, 183px);
      line-height: 0.9;
      letter-spacing: -0.04em;
      color: #fff;
      opacity: 0.45;
      transition: opacity 360ms ease;
    }

    .line.is-active { opacity: 1; }

    .hp {
      position: absolute;
      right: 170px;
      top: 41px;
      margin: 0;
      font-size: clamp(28px, 3.35vw, 48px);
      line-height: 1;
      letter-spacing: -0.02em;
      color: #fff;
      z-index: 2;
      transition: top 520ms cubic-bezier(.2, .65, .2, 1), opacity 360ms ease;
    }

    @media (max-width: 1050px) {
      .hero { min-height: 480px; }
      .headline { width: calc(100% - 32px); top: 120px; gap: 20px; }
      .top-nav { grid-template-columns: 1fr 1fr 1fr; grid-auto-rows: 40px; height: auto; }
      .brand { grid-column: 1 / -1; font-size: 14px; }
      .pill { font-size: 14px; height: 34px; }
      .hp { right: 24px; }
    }
  </style>
</head>
<body>
  <section class="hero" aria-label="Beckmans hero states">
    <div class="bg-layer is-visible" id="bg-a"><img alt="" /></div>
    <div class="bg-layer" id="bg-b"><img alt="" /></div>

    <nav class="top-nav">
      <span class="brand">beckmans designhögskola</span>
      <button class="pill is-active" data-state="form" data-index="0">form</button>
      <button class="pill" data-state="mode" data-index="1">mode</button>
      <button class="pill" data-state="visuell kommunikation" data-index="2">visuell kommunikation</button>
      <button class="pill" type="button">kvällskolan</button>
      <button class="pill" type="button">ansök</button>
    </nav>

    <div class="headline">
      <p class="line is-active" data-line="0">form</p>
      <p class="line" data-line="1">mode</p>
      <p class="line" data-line="2">visuell kommunikation</p>
    </div>
    <p class="hp" id="hp">180hp</p>
  </section>

  <script>
    const states = [
      {
        image: "https://beckmans.se/wp-content/uploads/2025/02/hallway-bench-mikael-westman-01-1500x1000.jpg",
        hpTop: 41
      },
      {
        image: "https://beckmans.se/wp-content/uploads/2025/06/Erik-Marklund-Beckmans-Designhogskola-4-1500x1200.jpg",
        hpTop: 203
      },
      {
        image: "https://beckmans.se/wp-content/uploads/2025/12/491418745_18385417684138754_597021362675519425_n.jpeg",
        hpTop: 687
      }
    ];

    const AUTO_MS = 3400;
    const PAUSE_AFTER_INTERACTION_MS = 7000;

    const bgA = document.getElementById("bg-a");
    const bgB = document.getElementById("bg-b");
    const hp = document.getElementById("hp");
    const lines = [...document.querySelectorAll("[data-line]")];
    const stateButtons = [...document.querySelectorAll("[data-index]")];

    let current = 0;
    let showA = true;
    let pauseUntil = 0;

    function paintText(index) {
      lines.forEach((line, i) => line.classList.toggle("is-active", i === index));
      stateButtons.forEach((button, i) => button.classList.toggle("is-active", i === index));
      hp.style.top = `${states[index].hpTop}px`;
    }

    function paintBackground(index, immediate = false) {
      const nextLayer = showA ? bgB : bgA;
      const prevLayer = showA ? bgA : bgB;
      const img = nextLayer.querySelector("img");
      img.src = states[index].image;
      img.alt = `Beckmans ${stateButtons[index].dataset.state}`;
      if (immediate) {
        nextLayer.classList.add("is-visible");
        prevLayer.classList.remove("is-visible");
      } else {
        nextLayer.classList.add("is-visible");
        prevLayer.classList.remove("is-visible");
      }
      showA = !showA;
    }

    function setState(index, fromUser = false) {
      if (index === current) return;
      current = index;
      paintText(current);
      paintBackground(current);
      if (fromUser) pauseUntil = Date.now() + PAUSE_AFTER_INTERACTION_MS;
    }

    function advance() {
      if (Date.now() < pauseUntil) return;
      setState((current + 1) % states.length, false);
    }

    function init() {
      bgA.querySelector("img").src = states[0].image;
      bgA.querySelector("img").alt = "Beckmans form";
      paintText(0);
      window.setInterval(advance, AUTO_MS);
      stateButtons.forEach((button, index) => {
        button.addEventListener("mouseenter", () => setState(index, true));
        button.addEventListener("focus", () => setState(index, true));
        button.addEventListener("click", () => setState(index, true));
      });
    }

    init();
  </script>
</body>
</html>
