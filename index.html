<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beckmans Hero States</title>
  <style>
    @font-face {
      font-family: "FuturaEFOP-DemiBold";
      src: url("./assets/fonts/FuturaEFOP-DemiBold.otf") format("opentype");
      font-style: normal;
      font-weight: 600;
      font-display: swap;
    }

    @font-face {
      font-family: "FuturaEFOP-Book";
      src: url("./assets/fonts/FuturaEFOP-Book.otf") format("opentype");
      font-style: normal;
      font-weight: 400;
      font-display: swap;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: #fff;
      color: #000;
      font-family: "FuturaEFOP-DemiBold", "Avenir Next", "Avenir", "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
    }

    .hero {
      width: 100vw;
      height: 100dvh;
      position: relative;
      overflow: hidden;
      background: #fff;
    }

    .bg-layer {
      position: absolute;
      inset: 0;
      opacity: 0;
      will-change: opacity, transform, filter, clip-path;
    }

    .bg-layer.is-visible { opacity: 1; }

    .bg-layer img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .bg-layer::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      transition: background-color 280ms ease;
    }

    .bg-layer.is-revealing {
      animation: layerReveal 760ms cubic-bezier(.22, .77, .17, 1) both;
      z-index: 1;
    }

    .bg-layer.is-exiting {
      animation: layerExit 760ms cubic-bezier(.22, .77, .17, 1) both;
      z-index: 0;
    }

    .transition-flash {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      z-index: 1;
      background: radial-gradient(
        circle at var(--reveal-x, 50%) var(--reveal-y, 50%),
        rgba(255, 255, 255, 0.22) 0%,
        rgba(255, 255, 255, 0.13) 14%,
        rgba(255, 255, 255, 0) 48%
      );
      mix-blend-mode: screen;
    }

    .hero.is-transitioning .transition-flash {
      animation: flashPulse 760ms cubic-bezier(.22, .77, .17, 1);
    }

    .top-nav {
      position: absolute;
      top: 22px;
      left: 23px;
      right: 23px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      z-index: 3;
      pointer-events: none;
    }

    .brand {
      font-size: 16px;
      line-height: 0.96;
      white-space: nowrap;
      text-transform: lowercase;
      transition: color 260ms ease;
    }

    .menu {
      display: inline-flex;
      align-items: center;
      gap: clamp(20px, 3vw, 46px);
    }

    .nav-link {
      color: inherit;
      font-size: 16px;
      letter-spacing: -0.02em;
      text-transform: lowercase;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: color 260ms ease;
      white-space: nowrap;
    }

    .headline {
      position: absolute;
      left: 16px;
      bottom: 30px;
      width: min(1118.507px, calc(100% - 32px));
      display: flex;
      flex-direction: column;
      gap: 40px;
      text-transform: lowercase;
      z-index: 2;
      user-select: none;
    }

    .line {
      appearance: none;
      border: 0;
      background: transparent;
      font-family: inherit;
      text-align: left;
      padding: 0;
      margin: 0;
      font-size: clamp(66px, 12.6815vw, 182.613px);
      line-height: 0.84;
      letter-spacing: -0.04em;
      color: #000;
      opacity: 1;
      width: fit-content;
      cursor: pointer;
      transition: opacity 320ms ease, color 280ms ease;
    }

    .line.is-active {
      opacity: 1;
    }

    .line.line-vk {
      line-height: 0.9;
    }

    .hp {
      position: absolute;
      left: 364px;
      top: 201px;
      margin: 0;
      font-size: clamp(28px, 3.333vw, 48px);
      line-height: normal;
      letter-spacing: -0.02em;
      color: #fff;
      z-index: 2;
      opacity: 0;
      will-change: top, left, opacity;
      transition: top 520ms cubic-bezier(.2, .65, .2, 1), left 520ms cubic-bezier(.2, .65, .2, 1), opacity 260ms ease;
      pointer-events: none;
    }

    .hero.is-idle .top-nav,
    .hero.is-idle .brand,
    .hero.is-idle .nav-link {
      color: #000;
    }

    .hero:not(.is-idle) .top-nav,
    .hero:not(.is-idle) .brand,
    .hero:not(.is-idle) .nav-link {
      color: #fff;
    }

    .hero:not(.is-idle) .line {
      color: #fff;
      opacity: 0.5;
    }

    .hero:not(.is-idle) .line.is-active {
      opacity: 1;
    }

    .hero:not(.is-idle) .hp {
      opacity: 1;
    }

    @keyframes layerReveal {
      0% {
        opacity: 0;
        clip-path: circle(0% at var(--reveal-x, 50%) var(--reveal-y, 50%));
        transform: scale(1.14);
        filter: blur(18px) saturate(1.25);
      }
      48% {
        opacity: 1;
      }
      100% {
        opacity: 1;
        clip-path: circle(165% at var(--reveal-x, 50%) var(--reveal-y, 50%));
        transform: scale(1);
        filter: blur(0) saturate(1);
      }
    }

    @keyframes layerExit {
      0% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0) saturate(1);
      }
      100% {
        opacity: 0;
        transform: scale(1.08);
        filter: blur(10px) saturate(0.92);
      }
    }

    @keyframes flashPulse {
      0% { opacity: 0; }
      20% { opacity: 0.9; }
      100% { opacity: 0; }
    }

    @media (max-width: 1050px) {
      .top-nav { flex-direction: column; align-items: flex-start; gap: 12px; }
      .menu { gap: 16px; flex-wrap: wrap; }
      .brand { font-size: 14px; }
      .nav-link { font-size: 14px; }
      .headline { width: calc(100% - 32px); bottom: 16px; gap: 20px; }
      .line { font-size: clamp(56px, 16vw, 140px); }
      .hp { font-size: clamp(22px, 5vw, 38px); }
    }

    @media (max-width: 760px) {
      .top-nav { flex-direction: column; align-items: flex-start; gap: 12px; }
      .menu { gap: 16px; flex-wrap: wrap; }
      .brand { font-size: 14px; }
      .nav-link { font-size: 14px; }
      .headline { gap: 10px; }
      .line { font-size: clamp(46px, 14vw, 96px); }
    }
  </style>
</head>
<body>
  <section class="hero is-idle" aria-label="Beckmans hero states">
    <div class="bg-layer" id="bg-a"><img alt="" /></div>
    <div class="bg-layer" id="bg-b"><img alt="" /></div>
    <div class="transition-flash" aria-hidden="true"></div>

    <nav class="top-nav">
      <span class="brand">beckmans designhögskola</span>
      <div class="menu">
        <span class="nav-link">form</span>
        <span class="nav-link">mode</span>
        <span class="nav-link">visuell kommunikation</span>
        <span class="nav-link">kvällskolan</span>
        <span class="nav-link">ansök</span>
      </div>
    </nav>

    <div class="headline">
      <button class="line" type="button" data-index="0" data-label="form">form</button>
      <button class="line" type="button" data-index="1" data-label="mode">mode</button>
      <button class="line line-vk" type="button" data-index="2" data-label="visuell kommunikation">visuell<br>kommunikation</button>
    </div>
    <p class="hp" id="hp">180hp</p>
  </section>

  <script>
    const DESIGN_W = 1440;
    const DESIGN_H = 800;

    const states = [
      {
        image: "https://beckmans.se/wp-content/uploads/2025/02/hallway-bench-mikael-westman-01-1500x1000.jpg",
        hpX: 364,
        hpY: 201
      },
      {
        image: "https://beckmans.se/wp-content/uploads/2025/06/Erik-Marklund-Beckmans-Designhogskola-4-1500x1200.jpg",
        hpX: 446,
        hpY: 363
      },
      {
        image: "https://beckmans.se/wp-content/uploads/2025/12/491418745_18385417684138754_597021362675519425_n.jpeg",
        hpX: 1137,
        hpY: 687
      }
    ];

    const hero = document.querySelector(".hero");
    const headline = document.querySelector(".headline");
    const bgA = document.getElementById("bg-a");
    const bgB = document.getElementById("bg-b");
    const hp = document.getElementById("hp");
    const textLinks = [...document.querySelectorAll(".line[data-index]")];
    const bgLayers = [bgA, bgB];

    let current = -1;
    let showA = true;
    let flashTimer = null;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getRevealPoint(triggerEl, evt) {
      const heroRect = hero.getBoundingClientRect();
      let x;
      let y;
      if (evt && typeof evt.clientX === "number" && typeof evt.clientY === "number") {
        x = ((evt.clientX - heroRect.left) / heroRect.width) * 100;
        y = ((evt.clientY - heroRect.top) / heroRect.height) * 100;
      } else {
        const rect = triggerEl.getBoundingClientRect();
        x = ((rect.left + rect.width / 2 - heroRect.left) / heroRect.width) * 100;
        y = ((rect.top + rect.height / 2 - heroRect.top) / heroRect.height) * 100;
      }
      return {
        x: clamp(x, 0, 100),
        y: clamp(y, 0, 100)
      };
    }

    function placeHp(index) {
      const pxTop = Math.round((hero.clientHeight * states[index].hpY) / DESIGN_H);
      const pxLeft = Math.round((hero.clientWidth * states[index].hpX) / DESIGN_W);
      hp.style.top = `${pxTop}px`;
      hp.style.left = `${pxLeft}px`;
    }

    function paintText(index) {
      textLinks.forEach((line, i) => line.classList.toggle("is-active", i === index));
      placeHp(index);
    }

    function paintBackground(index, revealPoint) {
      const nextLayer = showA ? bgB : bgA;
      const prevLayer = showA ? bgA : bgB;
      const img = nextLayer.querySelector("img");
      img.src = states[index].image;
      img.alt = `Beckmans ${textLinks[index].dataset.label}`;

      const revealX = `${revealPoint.x}%`;
      const revealY = `${revealPoint.y}%`;
      hero.style.setProperty("--reveal-x", revealX);
      hero.style.setProperty("--reveal-y", revealY);
      nextLayer.style.setProperty("--reveal-x", revealX);
      nextLayer.style.setProperty("--reveal-y", revealY);
      prevLayer.style.setProperty("--reveal-x", revealX);
      prevLayer.style.setProperty("--reveal-y", revealY);

      nextLayer.classList.remove("is-exiting", "is-revealing");
      prevLayer.classList.remove("is-revealing");
      void nextLayer.offsetWidth;
      nextLayer.classList.add("is-visible", "is-revealing");
      prevLayer.classList.remove("is-visible");
      prevLayer.classList.add("is-exiting");

      hero.classList.add("is-transitioning");
      if (flashTimer) window.clearTimeout(flashTimer);
      flashTimer = window.setTimeout(() => {
        hero.classList.remove("is-transitioning");
      }, 780);

      showA = !showA;
    }

    function setState(index, triggerEl, evt) {
      if (index === current) return;
      current = index;
      hero.classList.remove("is-idle");
      paintText(current);
      paintBackground(current, getRevealPoint(triggerEl, evt));
    }

    function setIdle() {
      current = -1;
      hero.classList.add("is-idle");
      hero.classList.remove("is-transitioning");
      if (flashTimer) {
        window.clearTimeout(flashTimer);
        flashTimer = null;
      }
      textLinks.forEach((line) => line.classList.remove("is-active"));
      bgLayers.forEach((layer) => layer.classList.remove("is-visible", "is-revealing", "is-exiting"));
    }

    function handleLayerAnimationEnd(evt) {
      const layer = evt.currentTarget;
      if (evt.animationName === "layerReveal") {
        layer.classList.remove("is-revealing");
      }
      if (evt.animationName === "layerExit") {
        layer.classList.remove("is-exiting");
      }
    }

    function init() {
      setIdle();
      bgLayers.forEach((layer) => layer.addEventListener("animationend", handleLayerAnimationEnd));
      textLinks.forEach((link, index) => {
        link.addEventListener("mouseenter", (evt) => setState(index, link, evt));
        link.addEventListener("focus", (evt) => setState(index, link, evt));
        link.addEventListener("click", (evt) => setState(index, link, evt));
        link.addEventListener("blur", () => {
          window.setTimeout(() => {
            if (!headline.contains(document.activeElement)) setIdle();
          }, 0);
        });
      });
      headline.addEventListener("mouseleave", setIdle);
      hero.addEventListener("mouseleave", setIdle);
      window.addEventListener("resize", () => {
        if (current >= 0) placeHp(current);
      });
    }

    init();
  </script>
</body>
</html>
