<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beckmans Hero States</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: #fff;
      color: #000;
      font-family: "FuturaEFOP-DemiBold", "Avenir Next", "Avenir", "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
    }

    .hero {
      width: 100vw;
      height: 100dvh;
      position: relative;
      overflow: hidden;
      background: #fff;
    }

    .bg-layer {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 620ms cubic-bezier(.2, .65, .2, 1);
      will-change: opacity;
    }

    .bg-layer.is-visible { opacity: 1; }

    .bg-layer img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .bg-layer::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      transition: background-color 280ms ease;
    }

    .top-nav {
      position: absolute;
      top: 22px;
      left: 23px;
      right: 23px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      z-index: 3;
    }

    .brand {
      font-size: 16px;
      line-height: 0.96;
      white-space: nowrap;
      text-transform: lowercase;
      transition: color 260ms ease;
    }

    .menu {
      display: inline-flex;
      align-items: center;
      gap: clamp(20px, 3vw, 46px);
    }

    .nav-link {
      appearance: none;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      font-size: 16px;
      letter-spacing: -0.02em;
      text-transform: lowercase;
      line-height: 1;
      height: auto;
      padding: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: color 260ms ease, opacity 260ms ease;
      white-space: nowrap;
    }

    .nav-link[data-index]::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -6px;
      width: 0;
      height: 2px;
      background: #ff5b57;
      transform: translateX(-50%);
      transition: width 250ms ease;
    }

    .nav-link.is-active[data-index]::after { width: 100%; }
    .nav-link.static { cursor: default; }

    .headline {
      position: absolute;
      left: 16px;
      top: 160px;
      width: min(1118px, calc(100% - 260px));
      display: flex;
      flex-direction: column;
      gap: 40px;
      text-transform: lowercase;
      z-index: 2;
      user-select: none;
    }

    .line {
      margin: 0;
      font-size: clamp(66px, 12.7vw, 183px);
      line-height: 0.9;
      letter-spacing: -0.04em;
      color: #000;
      opacity: 1;
      transition: opacity 300ms ease, color 260ms ease;
    }

    .line.is-active { opacity: 1; }

    .hp {
      position: absolute;
      right: 170px;
      top: 41px;
      margin: 0;
      font-size: clamp(28px, 3.35vw, 48px);
      line-height: 1;
      letter-spacing: -0.02em;
      color: #fff;
      z-index: 2;
      opacity: 0;
      transition: top 520ms cubic-bezier(.2, .65, .2, 1), opacity 260ms ease;
    }

    .hero.is-idle .top-nav,
    .hero.is-idle .brand,
    .hero.is-idle .nav-link {
      color: #000;
    }

    .hero:not(.is-idle) .top-nav,
    .hero:not(.is-idle) .brand,
    .hero:not(.is-idle) .nav-link {
      color: #fff;
    }

    .hero:not(.is-idle) .line {
      color: #fff;
      opacity: 0.45;
    }

    .hero:not(.is-idle) .line.is-active {
      opacity: 1;
    }

    .hero:not(.is-idle) .hp {
      opacity: 1;
    }

    @media (max-width: 1050px) {
      .headline { width: calc(100% - 32px); top: 120px; gap: 20px; }
      .top-nav { flex-direction: column; align-items: flex-start; gap: 12px; }
      .menu { gap: 16px; flex-wrap: wrap; }
      .brand { font-size: 14px; }
      .nav-link { font-size: 14px; }
      .hp { right: 24px; }
    }
  </style>
</head>
<body>
  <section class="hero is-idle" aria-label="Beckmans hero states">
    <div class="bg-layer" id="bg-a"><img alt="" /></div>
    <div class="bg-layer" id="bg-b"><img alt="" /></div>

    <nav class="top-nav">
      <span class="brand">beckmans designhögskola</span>
      <div class="menu" id="menu">
        <button class="nav-link" data-state="form" data-index="0">form</button>
        <button class="nav-link" data-state="mode" data-index="1">mode</button>
        <button class="nav-link" data-state="visuell kommunikation" data-index="2">visuell kommunikation</button>
        <span class="nav-link static">kvällskolan</span>
        <span class="nav-link static">ansök</span>
      </div>
    </nav>

    <div class="headline">
      <p class="line is-active" data-line="0">form</p>
      <p class="line" data-line="1">mode</p>
      <p class="line" data-line="2">visuell kommunikation</p>
    </div>
    <p class="hp" id="hp">180hp</p>
  </section>

  <script>
    const states = [
      {
        image: "https://beckmans.se/wp-content/uploads/2025/02/hallway-bench-mikael-westman-01-1500x1000.jpg",
        hpRatio: 0.05125
      },
      {
        image: "https://beckmans.se/wp-content/uploads/2025/06/Erik-Marklund-Beckmans-Designhogskola-4-1500x1200.jpg",
        hpRatio: 0.25375
      },
      {
        image: "https://beckmans.se/wp-content/uploads/2025/12/491418745_18385417684138754_597021362675519425_n.jpeg",
        hpRatio: 0.85875
      }
    ];

    const hero = document.querySelector(".hero");
    const menu = document.getElementById("menu");
    const bgA = document.getElementById("bg-a");
    const bgB = document.getElementById("bg-b");
    const hp = document.getElementById("hp");
    const lines = [...document.querySelectorAll("[data-line]")];
    const stateButtons = [...document.querySelectorAll("[data-index]")];

    let current = -1;
    let showA = true;

    function paintText(index) {
      lines.forEach((line, i) => line.classList.toggle("is-active", i === index));
      stateButtons.forEach((button, i) => button.classList.toggle("is-active", i === index));
      const pxTop = Math.round(hero.clientHeight * states[index].hpRatio);
      hp.style.top = `${pxTop}px`;
    }

    function paintBackground(index) {
      const nextLayer = showA ? bgB : bgA;
      const prevLayer = showA ? bgA : bgB;
      const img = nextLayer.querySelector("img");
      img.src = states[index].image;
      img.alt = `Beckmans ${stateButtons[index].dataset.state}`;
      nextLayer.classList.add("is-visible");
      prevLayer.classList.remove("is-visible");
      showA = !showA;
    }

    function setState(index) {
      if (index === current) return;
      current = index;
      hero.classList.remove("is-idle");
      paintText(current);
      paintBackground(current);
    }

    function setIdle() {
      current = -1;
      hero.classList.add("is-idle");
      lines.forEach((line) => line.classList.remove("is-active"));
      stateButtons.forEach((button) => button.classList.remove("is-active"));
      bgA.classList.remove("is-visible");
      bgB.classList.remove("is-visible");
    }

    function init() {
      setIdle();
      stateButtons.forEach((button, index) => {
        button.addEventListener("mouseenter", () => setState(index));
        button.addEventListener("focus", () => setState(index));
        button.addEventListener("click", () => setState(index));
        button.addEventListener("blur", () => {
          window.setTimeout(() => {
            if (!menu.contains(document.activeElement)) setIdle();
          }, 0);
        });
      });
      menu.addEventListener("mouseleave", setIdle);
      hero.addEventListener("mouseleave", setIdle);
      window.addEventListener("resize", () => {
        if (current >= 0) paintText(current);
      });
    }

    init();
  </script>
</body>
</html>
